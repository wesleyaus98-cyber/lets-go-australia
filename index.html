<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's Go Austrália | Consultoria Especializada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-australia-blue { background-color: #002B7F; }
        .text-australia-yellow { color: #FFCD00; }
        .bg-australia-yellow { background-color: #FFCD00; }
        .premium-gradient { background: linear-gradient(135deg, #002B7F 0%, #001a4d 100%); border: 2px solid #FFCD00; }
        
        /* Ajuste de espaço para não cobrir conteúdo com o rodapé */
        section { padding-bottom: 280px; } 
        @media (min-width: 768px) {
            section { padding-bottom: 200px; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

    <section id="landing-page" class="min-h-[85vh] flex flex-col items-center justify-center text-center p-6 bg-australia-blue text-white">
        <div class="mb-4 px-4 py-1 border border-blue-400 rounded-full text-[10px] md:text-sm uppercase tracking-widest text-blue-200">Consultoria de Imigração e Intercâmbio</div>
        <h1 class="text-3xl md:text-6xl font-bold mb-6">Viabilize seu projeto <span class="text-australia-yellow">Austrália</span></h1>
        <p class="text-lg md:text-xl mb-10 max-w-3xl text-blue-100 leading-relaxed">Diagnóstico financeiro profissional baseado na cotação atual.</p>
        <button onclick="showSection('form-page')" class="w-full md:w-auto bg-australia-yellow text-blue-900 font-bold py-4 px-12 rounded-lg text-lg hover:bg-yellow-400 transition-all shadow-xl uppercase tracking-wider">
            Solicitar Diagnóstico Gratuito
        </button>
    </section>

    <section id="form-page" class="hidden min-h-screen py-8 md:py-12 px-4 md:px-6">
        <div class="max-w-xl mx-auto bg-white rounded-2xl shadow-xl p-6 md:p-8">
            <h2 class="text-xl md:text-2xl font-bold mb-6 text-australia-blue text-center">Análise de Perfil Financeiro</h2>
            <form id="calc-form" onsubmit="generatePlan(event)" class="space-y-4">
                <input type="text" id="nome" required placeholder="Nome Completo" class="w-full p-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                <input type="email" id="email" required placeholder="Digite melhor E-mail" class="w-full p-3 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                
                <select id="visto" class="w-full p-3 border border-gray-300 rounded-lg bg-white">
                    <option value="working">Working Holiday (Subclass 462)</option>
                    <option value="student">Visto de Estudante (Subclass 500)</option>
                </select>

                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="salario" required placeholder="Renda (R$)" class="w-full p-3 border border-gray-300 rounded-lg">
                    <input type="number" id="guardar" required placeholder="Aporte (R$)" class="w-full p-3 border border-gray-300 rounded-lg">
                </div>
                
                <input type="number" id="tempo" required placeholder="Tempo pretendido (Meses)" class="w-full p-3 border border-gray-300 rounded-lg">
                
                <button type="submit" class="w-full bg-australia-blue text-white font-bold py-4 rounded-lg hover:bg-blue-900 transition-all uppercase">Gerar Diagnóstico</button>
            </form>
        </div>
    </section>

    <section id="result-page" class="hidden min-h-screen py-8 px-4 bg-gray-100">
        <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden">
            <div class="bg-australia-blue p-6 text-white text-center">
                <h2 class="text-2xl font-bold italic" id="res-saudacao">Relatório de Viabilidade</h2>
            </div>
            <div class="p-6">
                <div id="res-diagnostico" class="bg-blue-50 p-5 rounded-xl mb-6 border border-blue-100 text-blue-900 leading-relaxed"></div>
                <div class="premium-gradient p-6 rounded-2xl text-white text-center">
                    <h3 class="text-xl font-bold mb-4 italic">Quer o Plano Master? 🚀</h3>
                    <a href="https://wa.me/5511974788391?text=Quero+o+Plano+Premium" class="inline-block bg-australia-yellow text-blue-900 font-black py-3 px-8 rounded-full hover:scale-105 transition-all text-sm uppercase">Liberar por R$ 49,90</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 z-50 shadow-[0_-5px_20px_rgba(0,0,0,0.1)]">
        <div class="max-w-5xl mx-auto p-4 md:p-6 flex flex-col md:flex-row items-center justify-between gap-4">
            
            <div class="flex items-center justify-between w-full md:w-auto gap-8">
                <div class="flex flex-col">
                    <span class="text-[9px] font-bold text-green-600 uppercase tracking-widest">Câmbio Live</span>
                    <h3 class="text-base md:text-lg font-black text-blue-900 italic">AUD / BRL</h3>
                </div>
                <div>
                    <p id="cotacao-val" class="text-3xl md:text-4xl font-black text-gray-900 italic tracking-tighter">R$ ---</p>
                    <p id="cotacao-data" class="text-[9px] text-gray-400 italic">Sincronizando...</p>
                </div>
            </div>

            <div class="w-full md:w-1/2 bg-gray-50 p-3 rounded-xl border border-gray-100 flex gap-4">
                <div class="relative w-1/2">
                    <label class="text-[9px] font-bold text-blue-600 absolute -top-2 left-2 bg-gray-50 px-1">BRL</label>
                    <input type="number" id="conv-brl" oninput="converter('BRL')" class="w-full p-2 bg-transparent border-b border-gray-300 outline-none font-bold text-sm">
                </div>
                <div class="relative w-1/2">
                    <label class="text-[9px] font-bold text-yellow-600 absolute -top-2 left-2 bg-gray-50 px-1">AUD</label>
                    <input type="number" id="conv-aud" oninput="converter('AUD')" class="w-full p-2 bg-transparent border-b border-gray-300 outline-none font-bold text-sm">
                </div>
            </div>
        </div>
    </footer>

    <script>
        let cotacaoAUD = 3.80;

        async function buscarCotacao() {
            try {
                const response = await fetch('https://economia.awesomeapi.com.br/last/AUD-BRL');
                const data = await response.json();
                if (data && data.AUDBRL) {
                    cotacaoAUD = parseFloat(data.AUDBRL.bid);
                    document.getElementById('cotacao-val').innerText = `R$ ${cotacaoAUD.toFixed(2)}`;
                    const agora = new Date();
                    document.getElementById('cotacao-data').innerText = `Atualizado às ${agora.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}`;
                    document.getElementById('conv-brl').value = 1000;
                    converter('BRL');
                }
            } catch (e) { document.getElementById('cotacao-val').innerText = "R$ 3.80"; }
        }

        function converter(moeda) {
            const brl = document.getElementById('conv-brl');
            const aud = document.getElementById('conv-aud');
            if (moeda === 'BRL') aud.value = brl.value ? (parseFloat(brl.value) / cotacaoAUD).toFixed(2) : "";
            else brl.value = aud.value ? (parseFloat(aud.value) * cotacaoAUD).toFixed(2) : "";
        }

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function generatePlan(e) {
            e.preventDefault();
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const guardar = parseFloat(document.getElementById('guardar').value);
            const tempoDesejado = parseInt(document.getElementById('tempo').value);
            const tipoVisto = document.getElementById('visto').value;

            let metaAUD = tipoVisto === 'student' ? 15000 : 8500;
            let metaBRL = metaAUD * cotacaoAUD;
            const tempoReal = Math.ceil(metaBRL / guardar);
            const aporteIdeal = (metaBRL / tempoDesejado);

            document.getElementById('res-saudacao').innerText = `Sr(a). ${nome}, Diagnóstico Concluído.`;
            document.getElementById('res-diagnostico').innerHTML = `
                <p>Seu plano atual leva <b>${tempoReal} meses</b> para sair do papel.</p>
                <p class="mt-2 text-sm">Para embarcar em <b>${tempoDesejado} meses</b>, sua meta de aporte deve ser de <b>R$ ${aporteIdeal.toFixed(2)}</b>.</p>
            `;

            fetch("https://hook.us2.make.com/h4autqs8pdlhskimons1qlnf8cdp3dp4", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, email, visto: tipoVisto, guardarMensal: guardar, tempoDesejado, tempoRealMeses: tempoReal })
            });

            showSection('result-page');
        }

        window.onload = buscarCotacao;
        setInterval(buscarCotacao, 60000);
    </script>
</body>
</html>
